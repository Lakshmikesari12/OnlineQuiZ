<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Master</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

/* LOGIN PAGE */

.login-page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:25px;
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.login-box h1{
font-size:42px;
margin-bottom:30px;
color:#00e5ff;
}

/* LOGIN INPUTS */

.login-box input,
.login-box select{

width:100%;
padding:16px;
margin-bottom:20px;
border:none;
outline:none;
border-radius:12px;
font-size:18px;
background:white;
color:black;

}

.login-box select{
cursor:pointer;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

/* HOME PAGE */

.home-page{
display:none;
width:100%;
min-height:100vh;
padding:30px;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
text-align:center;
}

.logo-container img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00e5ff;
object-fit:cover;
box-shadow:0 0 20px #00e5ff;
}

.logo-title{
font-size:50px;
font-weight:800;
margin-top:15px;
color:#00e5ff;
}

.welcome{
margin-top:20px;
font-size:26px;
}

.search-box{
margin:35px auto;
max-width:450px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
}

.category-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.category-btn{
height:90px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

.category-btn:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00c6ff;
}

/* QUIZ PAGE */

.quiz-page{
display:none;
min-height:100vh;
padding:20px;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.quiz-box{
max-width:950px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:25px;
backdrop-filter:blur(15px);
}

.quiz-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.quiz-title{
font-size:30px;
color:#00e5ff;
}

.timer{
width:70px;
height:70px;
border-radius:50%;
background:#00e5ff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
color:black;
}

.progress-container{
width:100%;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00e5ff,#00ff99);
transition:0.4s;
}

.question{
font-size:28px;
margin-bottom:25px;
line-height:1.5;
}

.options{
display:flex;
flex-direction:column;
gap:15px;
}

.option{
padding:18px;
border-radius:14px;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
font-size:18px;
}

.option:hover{
background:rgba(0,229,255,0.15);
border-color:#00e5ff;
}

.option.correct{
background:#00ff99;
color:black;
}

.option.wrong{
background:#ff4d4d;
}

.navigation{
margin-top:30px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#493a37,#4b9444);
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

/* SCORE PAGE */

.score-page{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
background:linear-gradient(135deg,#141e30,#243b55);
}

.score-page h1{
font-size:50px;
margin-bottom:20px;
color:#00ffcc;
}

.score-page p{
font-size:24px;
margin-bottom:20px;
}

.explanation-box{
max-width:700px;
margin-top:20px;
text-align:left;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
}

.leaderboard{
margin-top:25px;
width:300px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
}

.restart-btn{
margin-top:25px;
padding:16px 40px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:20px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.logo-title{
font-size:36px;
}

.welcome{
font-size:20px;
}

.question{
font-size:22px;
}

.category-btn{
height:75px;
font-size:16px;
}

.quiz-title{
font-size:22px;
}

}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h1>QUIZ MASTER</h1>

<!-- NAME INPUT -->

<input 
type="text" 
placeholder="Enter Your Name" 
id="username"
>

<!-- PASSWORD INPUT -->

<input 
type="password" 
placeholder="Enter Password" 
id="password"
>

<!-- ROLE SELECT -->

<select id="userRole">

<option value="">Select Role</option>

<option value="Student">Student</option>

<option value="Professor">Professor</option>

</select>

<button class="login-btn" onclick="loginUser()">
Enter Platform
</button>

</div>

</div>

<!-- HOME PAGE -->

<div class="home-page" id="homePage">

<div class="logo-container">

<!-- ADD YOUR LOGO URL -->

<img src="logo.jpeg">

</div>

<div class="logo-title">QUIZ MASTER</div>

<div class="welcome" id="welcomeText"></div>

<div class="search-box">

<input type="text" placeholder="Search Category..." onkeyup="searchCategory(this.value)">

</div>

<div class="category-grid" id="categoryGrid">

<button class="category-btn">🧪 Science</button>
<button class="category-btn">➗ Maths</button>
<button class="category-btn">🌍 Social</button>
<button class="category-btn">🏛 Political</button>
<button class="category-btn">⚖ Ethical</button>
<button class="category-btn">📚 General Knowledge</button>
<button class="category-btn">📈 Aptitude</button>
<button class="category-btn">🧠 Reasoning</button>
<button class="category-btn">💻 Programming</button>
<button class="category-btn">🚀 Technology</button>
<button class="category-btn">📰 Current Affairs</button>
<button class="category-btn">✍ English</button>

</div>

</div>

<!-- QUIZ PAGE -->

<div class="quiz-page" id="quizPage">

<div class="quiz-box">

<div class="quiz-header">

<div class="quiz-title" id="quizTitle"></div>

<div class="timer" id="timer">30</div>

</div>

<div class="progress-container">

<div class="progress-bar" id="progressBar"></div>

</div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="navigation">

<button class="nav-btn" onclick="previousQuestion()">Previous</button>

<button class="nav-btn" onclick="nextQuestion()">Next</button>

</div>

</div>

</div>

<!-- SCORE PAGE -->

<div class="score-page" id="scorePage">

<h1>Quiz Completed 🎉</h1>

<p id="scoreText"></p>

<div class="leaderboard" id="leaderboard"></div>

<div class="explanation-box" id="explanationBox"></div>

<button class="restart-btn" onclick="restartQuiz()">Back To Home</button>

</div>

<script>

/* USER DETAILS */

let username="";
let password="";
let role="";

function loginUser(){

username=document.getElementById("username").value;

password=document.getElementById("password").value;

role=document.getElementById("userRole").value;

/* VALIDATION */

if(username===""){
alert("Please enter your name");
return;
}

if(password===""){
alert("Please enter password");
return;
}

if(role===""){
alert("Please select role");
return;
}

/* LOGIN SUCCESS */

document.getElementById("loginPage").style.display="none";

document.getElementById("homePage").style.display="block";

/* WELCOME MESSAGE */

document.getElementById("welcomeText").innerHTML=
`
Welcome <b>${username}</b> 👋 <br><br>
Role : <b>${role}</b>
`;

}

/* SEARCH */

function searchCategory(value){

let buttons=document.querySelectorAll(".category-btn");

buttons.forEach(btn=>{

if(btn.innerText.toLowerCase().includes(value.toLowerCase())){
btn.style.display="block";
}else{
btn.style.display="none";
}

});

}

/* QUIZ DATA */

const quizData={

Science:[
{
question:"Which planet is called Red Planet?",
options:["Earth","Mars","Venus","Saturn"],
answer:"Mars",
explanation:"Mars is called the Red Planet because of iron oxide on its surface."
},

{
question:"What gas do plants absorb?",
options:["Oxygen","Nitrogen","Carbon Dioxide","Helium"],
answer:"Carbon Dioxide",
explanation:"Plants absorb carbon dioxide during photosynthesis."
},

{
question:"Which organ pumps blood?",
options:["Liver","Heart","Kidney","Lungs"],
answer:"Heart",
explanation:"Heart pumps blood throughout the body."
}

],

Maths:[
{
question:"What is 12 × 12?",
options:["124","144","122","132"],
answer:"144",
explanation:"12 multiplied by 12 equals 144."
},

{
question:"Square root of 81?",
options:["7","8","9","10"],
answer:"9",
explanation:"9 × 9 = 81."
},

{
question:"What is 20% of 200?",
options:["20","30","40","50"],
answer:"40",
explanation:"20% of 200 = 40."
}

]

};

/* CATEGORY CLICK */

document.querySelectorAll(".category-btn").forEach(btn=>{

btn.onclick=()=>{

let category=btn.innerText.replace(/[^\w\s]/gi,'').trim();

startQuiz(category);

};

});

/* QUIZ LOGIC */

let currentQuiz=[];
let currentQuestion=0;
let selectedAnswers=[];
let timer;
let timeLeft=10;

function startQuiz(category){

currentQuiz=[...quizData[category]];

if(!currentQuiz){
alert("Questions Coming Soon");
return;
}

/* RANDOMIZE */

currentQuiz.sort(()=>Math.random()-0.5);

currentQuestion=0;

selectedAnswers=new Array(currentQuiz.length).fill(null);

document.getElementById("homePage").style.display="none";

document.getElementById("quizPage").style.display="block";

document.getElementById("quizTitle").innerText=
`${category} Quiz - ${username}`;

loadQuestion();
}

function loadQuestion(){

const q=currentQuiz[currentQuestion];

document.getElementById("question").innerText=q.question;

const optionsDiv=document.getElementById("options");

optionsDiv.innerHTML="";

/* PROGRESS */

let progress=((currentQuestion+1)/currentQuiz.length)*100;

document.getElementById("progressBar").style.width=
progress+"%";

/* TIMER */

clearInterval(timer);

timeLeft=10;

document.getElementById("timer").innerText=timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

nextQuestion();

}

},1000);

/* OPTIONS */

q.options.forEach(option=>{

const div=document.createElement("div");

div.classList.add("option");

div.innerText=option;

div.onclick=()=>selectOption(div,option);

optionsDiv.appendChild(div);

});

}

function selectOption(element,option){

let correct=currentQuiz[currentQuestion].answer;

document.querySelectorAll(".option").forEach(opt=>{

opt.style.pointerEvents="none";

if(opt.innerText===correct){
opt.classList.add("correct");
}

});

if(option!==correct){
element.classList.add("wrong");
}

selectedAnswers[currentQuestion]=option;
}

function nextQuestion(){

if(currentQuestion<currentQuiz.length-1){

currentQuestion++;

loadQuestion();

}else{

showScore();

}

}

function previousQuestion(){

if(currentQuestion>0){

currentQuestion--;

loadQuestion();

}

}

function showScore(){

clearInterval(timer);

let score=0;

let explanationHTML="<h2>Answer Explanations</h2><br>";

currentQuiz.forEach((q,index)=>{

if(selectedAnswers[index]===q.answer){
score++;
}

explanationHTML+=`
<p>
<b>Q${index+1}:</b> ${q.question}<br>
<b>Correct:</b> ${q.answer}<br>
<b>Explanation:</b> ${q.explanation}
</p><br>
`;

});

/* LEADERBOARD */

let leaderboard=
JSON.parse(localStorage.getItem("leaderboard")) || [];

leaderboard.push({
name:username,
score:score
});

leaderboard.sort((a,b)=>b.score-a.score);

localStorage.setItem("leaderboard",
JSON.stringify(leaderboard));

let leaderboardHTML="<h2>🏆 Leaderboard</h2><br>";

leaderboard.slice(0,3).forEach((item,index)=>{

leaderboardHTML+=`
<p>${index+1}. ${item.name} - ${item.score}</p>
`;

});

document.getElementById("quizPage").style.display="none";

document.getElementById("scorePage").style.display="flex";

document.getElementById("scoreText").innerHTML=
`${username}, You scored <b>${score}</b> out of <b>${currentQuiz.length}</b>`;

document.getElementById("leaderboard").innerHTML=
leaderboardHTML;

document.getElementById("explanationBox").innerHTML=
explanationHTML;

}

function restartQuiz(){

document.getElementById("scorePage").style.display="none";

document.getElementById("homePage").style.display="block";

}

</script>

</body>
</html>
